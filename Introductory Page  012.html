<!DOCTYPE html>

<title>CERAMICS</title>

<style>

body{
    margin:0;
    padding:0;
    background-color:#f9f7f1;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* NAVIGATION */
nav{
    padding:20px;
    background-color:#f9f7f1;
    border-bottom:2px solid #d4af37;
}

/* BUTTON LINKS */
nav a{
    text-decoration:none;
}

nav button{
    background-color:white;
    color:#c9a227;
    border:2px solid #d4af37;
    padding:12px 28px;
    margin:8px;
    font-size:15px;
    border-radius:40px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

nav button:hover{
    background-color:#d4af37;
    color:white;
    transform:scale(1.05);
}

/* VISITOR COUNTER */
.counter{
    margin-top:15px;
}

.counter button{
    background-color:#d4af37;
    color:white;
    border:none;
    padding:10px 22px;
    border-radius:30px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

/* TITLE */
h1{
    color:#c9a227;
    font-size:65px;
    letter-spacing:6px;
    margin-top:25px;
    margin-bottom:10px;
}

/* IMAGE */
.main-image img{
    width:75%;
    max-width:900px;
    border-radius:18px;
    box-shadow:0px 6px 18px rgba(0,0,0,0.25);
    margin-top:20px;
}

/* TEXT */
.welcome{
    margin-top:20px;
    color:#8b7500;
    font-size:20px;
    line-height:1.6;
    padding:0 20px;
}

/* FOOTER */
footer{
    margin-top:60px;
    padding:25px;
    border-top:2px solid #d4af37;
    color:#b8860b;
    font-size:16px;
}
